<script>
    // আপনার ২টা API Key
    const apiKeys = ["AIzaSyDjN0RJ-iR0NSbVe_jizvGt_UBO4C8XOBU", "AIzaSyDDDGJOs_JsaPc8-uPf6BDpwceCO-vLs9w"];
    let currentKeyIndex = parseInt(localStorage.getItem('herovee_key_index')) || 0;
    const chatBox = document.getElementById('chatBox');
    let selectedImgBase64 = null;

    window.onload = () => {
        const saved = localStorage.getItem('herovee_chat_permanent');
        if (saved) { chatBox.innerHTML = saved; chatBox.scrollTop = chatBox.scrollHeight; }
    };

    function saveChat() { localStorage.setItem('herovee_chat_permanent', chatBox.innerHTML); }

    async function runAI() {
        const input = document.getElementById('userInput');
        const prompt = input.value.trim();
        if (!prompt && !selectedImgBase64) return;

        // UI Update (User side)
        if(selectedImgBase64) {
            let img = document.createElement('img'); img.src=`data:image/jpeg;base64,${selectedImgBase64}`; img.className='media-msg';
            chatBox.appendChild(img);
        }
        if(prompt) {
            let d = document.createElement('div'); d.className='msg user-msg'; d.innerText=prompt;
            chatBox.appendChild(d);
        }

        const tempImg = selectedImgBase64;
        input.value = ''; clearPreview();
        chatBox.scrollTop = chatBox.scrollHeight; saveChat();

        // Loading
        let loading = document.createElement('div'); loading.className='msg ai-msg'; loading.innerText="HEROVEE ভাবছে...";
        chatBox.appendChild(loading); chatBox.scrollTop = chatBox.scrollHeight;

        // API Rotation
        const apiKey = apiKeys[currentKeyIndex];
        currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
        localStorage.setItem('herovee_key_index', currentKeyIndex);

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt || "Explain this image" }, ...(tempImg ? [{ inline_data: { mime_type: "image/jpeg", data: tempImg } }] : [])] }] })
            });
            const data = await res.json();
            loading.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) { loading.innerText = "Error boss! Try again."; }
        
        chatBox.scrollTop = chatBox.scrollHeight; saveChat();
    }
</script>
