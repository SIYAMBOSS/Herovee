<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI - Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; flex-direction:column; height:100vh;">
    <header class="chat-header">
        <div style="display:flex; align-items:center;">
            <div style="width:38px; height:38px; background:linear-gradient(45deg,#45f3ff,#ff3c7b); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:bold;">H</div>
            <h1 style="color:#45f3ff; margin-left:12px; font-weight:bold;">HEROVEE AI SYSTEM</h1>
        </div>
        <i class="fa-solid fa-power-off" onclick="window.location.href='index.html'"></i>
    </header>

    <div id="chatBox" class="chat-container">
        <div class="msg ai-msg">আসসালামু আলাইকুম সিয়াম বস্! আমি আপনার কথা শোনার জন্য রেডি।</div>
    </div>

    <div class="input-area">
        <div id="previewBox" class="image-preview-box"></div>
        <div class="input-wrapper">
            <label for="imgInp" style="color:#45f3ff; margin-right:10px; cursor:pointer;"><i class="fa-solid fa-camera"></i></label>
            <input type="file" id="imgInp" style="display:none;" onchange="previewImg(this)">
            <textarea id="userInput" rows="1" placeholder="Type message..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button onclick="runAI()" style="background:none; border:none; color:#45f3ff; font-size:22px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // আপনার ৫০টি API Key এখানে কমা দিয়ে বসিয়ে দিন
        const apiKeys = [
            "AIzaSy...Key1", "AIzaSy...Key2", "AIzaSy...Key3" 
            // ... এভাবে ৫০টি বসান
        ];
        let currentKeyIndex = 0;
        let selectedImg = null;

        function previewImg(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { 
                    selectedImg = e.target.result;
                    document.getElementById('previewBox').innerHTML = `<div class="preview-item"><img src="${selectedImg}"><i class="fa-solid fa-circle-xmark close-preview" onclick="clearPreview()"></i></div>`;
                    document.getElementById('previewBox').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function clearPreview() { selectedImg = null; document.getElementById('previewBox').style.display = 'none'; }

        async function runAI() {
            const box = document.getElementById('chatBox');
            const text = document.getElementById('userInput').value.trim();
            if(!text && !selectedImg) return;

            // UI Update
            if(selectedImg) {
                let img = document.createElement('img'); img.src=selectedImg; img.className='media-msg';
                box.appendChild(img);
            }
            if(text) {
                let d = document.createElement('div'); d.className='msg user-msg'; d.innerText=text;
                box.appendChild(d);
            }
            
            document.getElementById('userInput').value = '';
            clearPreview();
            box.scrollTop = box.scrollHeight;

            // API Rotation Logic
            const currentAPIKey = apiKeys[currentKeyIndex];
            console.log("Using Key Index:", currentKeyIndex);
            
            // Key Rotation for next time
            currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;

            // AI Response (Gemini API Call Sample)
            setTimeout(() => {
                let ai = document.createElement('div'); ai.className='msg ai-msg';
                ai.innerText = "জি সিয়াম বস্, আপনার মেসেজ প্রসেস করা হচ্ছে (Using Key "+(currentKeyIndex)+")";
                box.appendChild(ai);
                box.scrollTop = box.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
