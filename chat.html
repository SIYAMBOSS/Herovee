<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herovee AI - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-bg">
    <header class="chat-header">
        <div class="flex items-center w-full justify-between">
            <div class="flex items-center">
                <div class="ai-avatar-glow">H</div>
                <div class="ml-3">
                    <h1 class="text-cyan-400 font-bold">HEROVEE AI SYSTEM</h1>
                </div>
            </div>
            <i class="fa-solid fa-power-off text-gray-500" onclick="window.location.href='index.html'"></i>
        </div>
    </header>

    <div id="chatBox" class="chat-container">
        <div class="msg ai-msg">আসসালামু আলাইকুম সিয়াম বস্! আমি আপনার HEROVEE AI।</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <label for="imageUpload" class="action-icon"><i class="fa-solid fa-camera"></i></label>
            <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="previewImage(this)">
            <textarea id="userInput" rows="1" placeholder="Type message..." oninput="autoGrow(this)"></textarea>
            <button onclick="sendMessage()" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let selectedImageData = null;

        function autoGrow(e) { e.style.height = "5px"; e.style.height = (e.scrollHeight) + "px"; }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { 
                    selectedImageData = e.target.result;
                    document.querySelector('.input-wrapper').style.borderColor = "#45f3ff";
                };
                reader.readAsDataURL(file);
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg && !selectedImageData) return;

            if (selectedImageData) addMedia(selectedImageData);
            if (msg) addMessage(msg, 'user-msg');

            input.value = ''; input.style.height = "auto";
            selectedImageData = null;
            document.querySelector('.input-wrapper').style.borderColor = "#222";

            setTimeout(() => addMessage("জি সিয়াম বস্, আমি দেখছি...", 'ai-msg'), 1000);
        }

        function addMessage(t, c) {
            const b = document.getElementById('chatBox');
            const d = document.createElement('div');
            d.className = `msg ${c}`; d.innerText = t;
            b.appendChild(d); b.scrollTop = b.scrollHeight;
        }

        function addMedia(s) {
            const b = document.getElementById('chatBox');
            const i = document.createElement('img');
            i.src = s; i.className = "media-msg";
            b.appendChild(i); b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
