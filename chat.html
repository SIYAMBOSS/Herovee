<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herovee AI - Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-bg" style="display:block; overflow-y:auto;">
    <header style="position:fixed; top:0; width:100%; background:#0d0d0d; padding:15px; display:flex; justify-content:space-between; z-index:100;">
        <h1 style="color:#45f3ff; font-size:18px;">HEROVEE AI SYSTEM</h1>
        <i class="fa-solid fa-right-from-bracket" style="cursor:pointer;" onclick="window.location.href='index.html'"></i>
    </header>

    <div id="chatBox" class="chat-container">
        <div class="msg ai-msg">আসসালামু আলাইকুম সিয়াম বস্! আমি রেডি।</div>
    </div>

    <div style="position:fixed; bottom:0; width:100%; padding:20px; background:#050505;">
        <div style="background:#121212; border-radius:30px; display:flex; padding:10px 20px; align-items:center;">
            <textarea id="userInput" style="flex:1; background:none; border:none; color:white; outline:none;" placeholder="Type message..."></textarea>
            <button onclick="runAI()" style="background:none; border:none; color:#45f3ff; font-size:20px; margin-left:10px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const apiKeys = ["AIzaSyDjN0RJ-iR0NSbVe_jizvGt_UBO4C8XOBU", "AIzaSyDDDGJOs_JsaPc8-uPf6BDpwceCO-vLs9w"];
        let currentKeyIndex = parseInt(localStorage.getItem('herovee_key_index')) || 0;
        const chatBox = document.getElementById('chatBox');

        async function runAI() {
            const input = document.getElementById('userInput');
            const prompt = input.value.trim();
            if (!prompt) return;

            let userMsg = document.createElement('div'); userMsg.className='msg user-msg'; userMsg.innerText=prompt;
            chatBox.appendChild(userMsg); input.value = '';

            let loading = document.createElement('div'); loading.className='msg ai-msg'; loading.innerText="HEROVEE ভাবছে...";
            chatBox.appendChild(loading); chatBox.scrollTop = chatBox.scrollHeight;

            const apiKey = apiKeys[currentKeyIndex];
            currentKeyIndex = (currentKeyIndex + 1) % apiKeys.length;
            localStorage.setItem('herovee_key_index', currentKeyIndex);

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                loading.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { loading.innerText = "Error boss! Try again."; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
