<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herovee AI - Siyam Boss Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="orbit"></div>
    <div class="auth-card">
        <h2 class="herovee-title text-4xl mb-8" style="font-size: 35px; margin-bottom: 30px;">HEROVEE</h2>
        
        <div id="loginFields" class="w-full" style="width: 100%;">
            <input type="email" id="loginEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="loginPass" placeholder="Password" class="input-style">
            <button onclick="handleLogin()" class="action-btn">SIGN IN</button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">New here? <span onclick="toggleForm()" style="color:#45f3ff; cursor:pointer; text-decoration:underline;">Create Account</span></p>
        </div>

        <div id="signupFields" class="w-full" style="display: none; width: 100%;">
            <input type="text" id="signupName" placeholder="Full Name" class="input-style">
            <input type="email" id="signupEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="signupPass" placeholder="Password" class="input-style">
            <button onclick="handleSignup()" class="action-btn">CREATE ACCOUNT</button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">Back to <span onclick="toggleForm()" style="color:#45f3ff; cursor:pointer; text-decoration:underline;">Sign In</span></p>
        </div>

        <div id="google_login_btn" onclick="handleGoogleLogin()">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="30">
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2mVQ231K2kEqhxP01YJyiuZzsFK1RIcE",
            authDomain: "herovee-ai.firebaseapp.com",
            projectId: "herovee-ai",
            appId: "1:89517868095:web:c0500e9a8dbb426cada48a"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function toggleForm() {
            const l = document.getElementById('loginFields');
            const s = document.getElementById('signupFields');
            if(l.style.display === 'none') {
                l.style.display = 'block'; s.style.display = 'none';
            } else {
                l.style.display = 'none'; s.style.display = 'block';
            }
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await auth.signInWithPopup(provider);
                if(result.user) window.location.href = 'chat.html';
            } catch (err) { alert("Google Login Error: " + err.message); }
        }

        async function handleLogin() {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPass').value;
            if(!e || !p) return alert("Please fill all fields");
            try {
                await auth.signInWithEmailAndPassword(e, p);
                window.location.href = 'chat.html';
            } catch (err) { alert("Invalid Gmail or Password!"); }
        }
    </script>
</body>
</html>
