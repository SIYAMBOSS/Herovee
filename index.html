<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orbit"></div>
    <div class="auth-card">
        <h2 class="herovee-title">HEROVEE</h2>
        
        <div id="loginForm" style="width:100%;">
            <input type="email" id="lEmail" placeholder="Gmail Address" class="input-style" style="margin-bottom:12px;">
            <div class="input-group">
                <input type="password" id="lPass" placeholder="Password" class="input-style">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePass('lPass', this)"></i>
            </div>
            <button onclick="handleAuth()" class="action-btn">SIGN IN</button>
            <p style="text-align:center; margin-top:15px; font-size:12px;">New? <span onclick="toggleView()" style="color:#45f3ff; cursor:pointer;">Create Account</span></p>
        </div>

        <div id="signupForm" style="display:none; width:100%;">
            <div class="input-group">
                <input type="text" id="countryInp" placeholder="Select Country" class="input-style" readonly onclick="showCountries()">
                <div id="countryList" class="country-list"></div>
            </div>
            <input type="text" placeholder="Full Name" class="input-style" style="margin-bottom:12px;">
            <input type="email" placeholder="Gmail Address" class="input-style" style="margin-bottom:12px;">
            <div class="input-group">
                <input type="password" id="sPass" placeholder="Create Password" class="input-style">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePass('sPass', this)"></i>
            </div>
            <div class="input-group">
                <input type="password" id="sConfirm" placeholder="Confirm Password" class="input-style">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePass('sConfirm', this)"></i>
            </div>
            <button onclick="handleAuth()" class="action-btn">CREATE ACCOUNT</button>
            <p style="text-align:center; margin-top:15px; font-size:12px;">Back to <span onclick="toggleView()" style="color:#45f3ff; cursor:pointer;">Sign In</span></p>
        </div>

        <div id="google_login_btn" onclick="handleAuth()">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="30">
        </div>
    </div>

    <script>
        function togglePass(id, el) {
            const p = document.getElementById(id);
            if(p.type === 'password') { p.type = 'text'; el.className = 'fa-solid fa-eye-slash eye-icon'; }
            else { p.type = 'password'; el.className = 'fa-solid fa-eye eye-icon'; }
        }
        function toggleView() {
            const l = document.getElementById('loginForm'), s = document.getElementById('signupForm');
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }
        function showCountries() {
            const list = document.getElementById('countryList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
            if(list.innerHTML === "") {
                ["Bangladesh", "India", "USA", "UK"].forEach(c => {
                    let d = document.createElement('div'); d.className='country-item'; d.innerText=c;
                    d.onclick = () => { document.getElementById('countryInp').value=c; list.style.display='none'; };
                    list.appendChild(d);
                });
            }
        }
        function handleAuth() { window.location.href='chat.html'; }
    </script>
</body>
</html>
