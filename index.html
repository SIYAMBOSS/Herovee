<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI System - Siyamboss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { background: #050505; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; }
        
        .herovee-title { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 5px; background: linear-gradient(90deg, #45f3ff, #ff3c7b, #45f3ff); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: gradientShift 3s linear infinite; text-shadow: 0 0 15px rgba(69, 243, 255, 0.5); }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .auth-card { position: relative; width: 380px; min-height: 550px; background: #111; border-radius: 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .orbit { position: absolute; width: 410px; height: 620px; background: linear-gradient(0deg, transparent, #45f3ff, #ff3c7b); border-radius: 50%; z-index: 1; animation: rotate 4s linear infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .input-style { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 20px; margin-bottom: 12px; color: white; outline: none; font-size: 14px; transition: 0.3s; }
        .input-style:focus { border-color: #45f3ff; box-shadow: 0 0 10px rgba(69, 243, 255, 0.2); }

        /* Responsive Notifications */
        #customAlert { position: fixed; z-index: 9999; background: rgba(17, 17, 17, 0.95); border-left: 5px solid #45f3ff; color: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; font-size: 14px; }
        #customAlert.error { border-left-color: #ff3c7b; }
        @media (min-width: 768px) { #customAlert { top: 20px; right: -400px; } #customAlert.show { right: 20px; opacity: 1; pointer-events: auto; } }
        @media (max-width: 767px) { #customAlert { top: -100px; left: 50%; transform: translateX(-50%); width: 90%; text-align: center; } #customAlert.show { top: 20px; opacity: 1; pointer-events: auto; } }

        .google-btn { width: 100%; padding: 12px; border-radius: 15px; background: white; color: #333; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s; margin-top: 15px; border: none; font-size: 14px; }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }

        .divider { display: flex; align-items: center; width: 100%; margin: 20px 0; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        .action-btn { width: 100%; padding: 14px; border-radius: 15px; background: linear-gradient(90deg, #45f3ff, #ff3c7b); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; letter-spacing: 1px; }
        .action-btn:active { transform: scale(0.95); }

        .country-list { display: none; position: absolute; top: 110%; left: 0; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; z-index: 100; max-height: 150px; overflow-y: auto; width: 100%; }
        .country-item { padding: 10px 20px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .country-item:hover { background: rgba(69, 243, 255, 0.1); color: #45f3ff; }
        
        #signupFields { display: none; width: 100%; }
        #loginFields { width: 100%; }
    </style>
</head>
<body>

    <div id="customAlert"></div>
    <div class="orbit"></div>
    
    <div id="authCard" class="auth-card shadow-2xl">
        <h2 class="herovee-title text-4xl mb-8">HEROVEE</h2>
        
        <div id="loginFields">
            <input type="email" id="loginEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="loginPass" placeholder="Password" class="input-style">
            <button onclick="handleLogin()" class="action-btn">SIGN IN</button>
            
            <div class="divider">OR</div>
            
            <button onclick="handleGoogleLogin()" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" alt="Google">
                Continue with Google
            </button>

            <p class="text-[12px] text-gray-500 mt-6 text-center">Don't have an account? <span onclick="toggleForm()" class="text-cyan-400 cursor-pointer font-bold underline">Create Now</span></p>
        </div>

        <div id="signupFields">
            <input type="text" id="signupName" placeholder="Full Name" class="input-style">
            
            <div class="relative w-full mb-3">
                <div onclick="toggleCountryList()" id="countryBox" class="input-style flex justify-between items-center cursor-pointer mb-0">
                    <span id="countryText">Select Country</span>
                    <span>▼</span>
                </div>
                <div id="countryList" class="country-list">
                    <input type="text" id="countrySearch" onkeyup="filterCountries()" placeholder="Search..." class="w-full bg-white/5 p-2 outline-none border-b border-white/10 text-cyan-400 text-sm">
                    <div id="countryOptions"></div>
                </div>
            </div>

            <input type="email" id="signupEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="signupPass" placeholder="Password" class="input-style">
            <button onclick="handleSignup()" class="action-btn">CREATE ACCOUNT</button>
            <p class="text-[12px] text-gray-500 mt-4 text-center">Already have account? <span onclick="toggleForm()" class="text-cyan-400 cursor-pointer font-bold underline">Login</span></p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2mVQ231K2kEqhxP01YJyiuZzsFK1RIcE",
            authDomain: "herovee-ai.firebaseapp.com",
            projectId: "herovee-ai",
            storageBucket: "herovee-ai.firebasestorage.app",
            messagingSenderId: "89517868095",
            appId: "1:89517868095:web:c0500e9a8dbb426cada48a",
            measurementId: "G-CXHX9FDZWQ"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let selectedCountry = "";
        const countries = ["Bangladesh", "India", "USA", "UK", "Canada", "Australia", "UAE", "Saudi Arabia"];

        function showMessage(text, type = 'success') {
            const alertBox = document.getElementById('customAlert');
            alertBox.innerText = text;
            alertBox.className = type === 'error' ? 'show error' : 'show';
            setTimeout(() => alertBox.classList.remove('show'), 3500);
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await db.collection("users").doc(result.user.uid).set({
                    fullName: result.user.displayName,
                    email: result.user.email,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                showMessage("Login Successful! Welcome " + result.user.displayName);
            } catch (err) { showMessage("Google Authentication Failed!", "error"); }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showMessage("Login Successful! Redirecting...");
            } catch (err) { showMessage("Invalid Email or Password!", "error"); }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            if(!name || !selectedCountry) return showMessage("Please fill all details!", "error");
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("users").doc(cred.user.uid).set({
                    fullName: name,
                    country: selectedCountry,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showMessage("Account Created Successfully!");
                toggleForm();
            } catch (err) { showMessage(err.message, "error"); }
        }

        function toggleForm() {
            const isL = document.getElementById('loginFields').style.display !== 'none';
            document.getElementById('loginFields').style.display = isL ? 'none' : 'block';
            document.getElementById('signupFields').style.display = isL ? 'block' : 'none';
            document.getElementById('authCard').style.minHeight = isL ? '620px' : '550px';
        }

        function toggleCountryList() {
            const list = document.getElementById('countryList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }

        function setCountry(c) {
            selectedCountry = c;
            document.getElementById('countryText').innerText = c;
            toggleCountryList();
        }

        window.onload = () => {
            document.getElementById('countryOptions').innerHTML = countries.map(c => `<div class="country-item" onclick="setCountry('${c}')">${c}</div>`).join('');
        };
    </script>
</body>
</html>
