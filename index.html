<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* সেই উজ্জ্বল অ্যানিমেটেড বর্ডার */
        .login-card { position: relative; width: 380px; height: 520px; background: #111; border-radius: 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .orbit { position: absolute; width: 410px; height: 550px; background: linear-gradient(0deg, transparent, #45f3ff, #ff3c7b); border-radius: 50%; z-index: 1; animation: rotate 4s linear infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .input-style { width: 90%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 20px; margin-bottom: 15px; color: white; outline: none; transition: 0.3s; font-size: 14px; }
        .input-style:focus { border-color: #45f3ff; box-shadow: 0 0 10px rgba(69, 243, 255, 0.3); }

        .action-btn { width: 90%; padding: 14px; border-radius: 15px; border: none; background: linear-gradient(90deg, #45f3ff, #ff3c7b); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(69, 243, 255, 0.4); }
        
        .footer-links { margin-top: 20px; font-size: 12px; color: #888; display: flex; gap: 15px; }
        .footer-links span { cursor: pointer; color: #45f3ff; }
    </style>
</head>
<body>

    <div class="orbit"></div>
    <div class="login-card shadow-2xl">
        <h2 id="form-title" class="text-3xl font-black text-white mb-8 tracking-widest">HEROVEE</h2>
        
        <input type="email" id="email" placeholder="Gmail Address" class="input-style">
        <input type="password" id="pass" placeholder="Password" class="input-style">
        
        <button id="main-btn" onclick="handleAuth()" class="action-btn">SIGN IN</button>
        
        <div class="footer-links">
            <p id="toggle-text">Don't have an account?</p>
            <span id="toggle-link" onclick="toggleForm()">Create Account</span>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleForm() {
            const title = document.getElementById('form-title');
            const btn = document.getElementById('main-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleLink = document.getElementById('toggle-link');

            if (isLogin) {
                title.innerText = "SIGN UP";
                btn.innerText = "CREATE ACCOUNT";
                toggleText.innerText = "Already have an account?";
                toggleLink.innerText = "Sign In";
            } else {
                title.innerText = "HEROVEE";
                btn.innerText = "SIGN IN";
                toggleText.innerText = "Don't have an account?";
                toggleLink.innerText = "Create Account";
            }
            isLogin = !isLogin;
        }

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if (!email || !pass) {
                alert("বস্, সব তথ্য ঠিকঠাক দিন!");
                return;
            }

            if (isLogin) {
                // সিয়াম বস্-এর জন্য স্পেশাল চেক
                if(email === "sadaf245sz@gmail.com" && pass === "siyamboss") {
                    alert("স্বাগতম সিয়াম বস্! Herovee সিস্টেম আনলক হচ্ছে...");
                    window.location.href = "chat.html"; // চ্যাট স্ক্রিনে নিয়ে যাবে
                } else {
                    alert("ভুল তথ্য! সঠিক জিমেইল এবং পাসওয়ার্ড দিন।");
                }
            } else {
                alert("Account Created Successfully! এখন লগইন করুন।");
                toggleForm();
            }
        }
    </script>
</body>
</html>
