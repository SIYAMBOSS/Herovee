<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; overflow: hidden; font-family: sans-serif; }
        /* Animated Border Login */
        .login-box { position: relative; width: 350px; height: 450px; background: #111; border-radius: 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orbit { position: absolute; width: 380px; height: 480px; background: linear-gradient(0deg, transparent, #45f3ff, #ff3c7b); border-radius: 50%; z-index: 1; animation: rotate 4s linear infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #app-screen { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="login-screen" class="relative flex items-center justify-center">
        <div class="orbit"></div>
        <div class="login-box p-8">
            <h2 class="text-3xl font-bold mb-8 tracking-widest text-cyan-400">LOGIN</h2>
            <input type="password" id="pass" placeholder="Password" class="w-full bg-white/5 border border-white/20 p-3 rounded-2xl mb-4 outline-none focus:border-cyan-400 text-center">
            <button onclick="checkPass()" class="w-full bg-gradient-to-r from-cyan-500 to-pink-500 py-3 rounded-2xl font-bold hover:scale-105 transition">SIGN IN</button>
        </div>
    </div>

    <div id="app-screen" class="w-full max-w-2xl h-[90vh] flex flex-col p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">HEROVEE AI</h1>
            <span class="text-[10px] text-gray-500">ACTIVE SESSION: SIYAMBOSS</span>
        </header>
        
        <div id="chatContainer" class="flex-1 glass rounded-[2.5rem] p-6 overflow-y-auto space-y-4 mb-4">
            <div class="glass p-3 rounded-2xl max-w-[80%] text-sm border-l-2 border-cyan-500">সিস্টেম অনলাইন। আপনার সব কথা আমার মনে থাকবে।</div>
        </div>

        <div class="flex gap-2 bg-white/5 p-2 rounded-full border border-white/10">
            <input type="text" id="userInput" placeholder="Herovee-কে কিছু বলুন..." class="flex-1 bg-transparent px-4 outline-none">
            <button onclick="sendToHerovee()" class="bg-cyan-500 p-3 rounded-full text-black">➤</button>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function checkPass() {
            if(document.getElementById('pass').value === "siyamboss") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
            } else { alert("ভুল পাসওয়ার্ড!"); }
        }

        async function sendToHerovee() {
            const input = document.getElementById('userInput');
            const msg = input.value;
            if(!msg) return;

            document.getElementById('chatContainer').innerHTML += `<div class="flex justify-end"><div class="bg-cyan-900/40 p-3 rounded-2xl max-w-[85%] text-sm">${msg}</div></div>`;
            input.value = "";

            chatHistory.push({ "role": "user", "parts": [{ "text": msg }] });

            const res = await fetch('http://localhost:3000/ask-herovee', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatHistory })
            });
            
            const data = await res.json();
            document.getElementById('chatContainer').innerHTML += `<div class="flex justify-start"><div class="glass p-3 rounded-2xl max-w-[85%] text-sm border-l-2 border-purple-500">${data.text}</div></div>`;
            chatHistory.push({ "role": "model", "parts": [{ "text": data.text }] });
            
            // Voice
            let s = new SpeechSynthesisUtterance(data.text);
            s.lang = 'bn-BD'; window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
