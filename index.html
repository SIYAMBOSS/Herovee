<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herovee AI - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orbit"></div>
    <div id="custom-toast">মেসেজ এখানে দেখাবে</div>

    <div class="auth-card">
        <h2 class="herovee-title">HEROVEE</h2>
        
        <div id="loginForm" style="width:100%; display: flex; flex-direction: column;">
            <div class="input-group"><input type="email" id="lEmail" placeholder="Gmail Address" class="input-style"></div>
            <div class="input-group">
                <input type="password" id="lPass" placeholder="Password" class="input-style">
                <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePass('lPass', this)"></i>
            </div>
            <button onclick="handleLogin()" class="action-btn">SIGN IN</button>
            <p style="text-align:center; margin-top:22px; font-size:12px; color: #888;">
                New? <span onclick="toggleAuth()" style="color:#45f3ff; cursor:pointer; font-weight:bold;">Create Account</span>
            </p>
        </div>

        <div id="signupForm" style="display:none; width:100%;">
            <input type="email" id="sEmail" placeholder="Gmail Address" class="input-style" style="margin-bottom:14px;">
            <div class="input-group">
                <input type="password" id="sPass" placeholder="Create Password" class="input-style">
                <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePass('sPass', this)"></i>
            </div>
            <div class="input-group">
                <input type="password" id="sConfirm" placeholder="Confirm Password" class="input-style">
                <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePass('sConfirm', this)"></i>
            </div>
            <button onclick="handleSignup()" class="action-btn">CREATE ACCOUNT</button>
            <p style="text-align:center; margin-top:22px; font-size:12px; color: #888;">
                Back to <span onclick="toggleAuth()" style="color:#45f3ff; cursor:pointer; font-weight:bold;">Sign In</span>
            </p>
        </div>

        <div id="google_login_btn" onclick="handleGoogleLogin()">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="30">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjN0RJ-iR0NSbVe_jizvGt_UBO4C8XOBU",
            authDomain: "sadaf245sz.firebaseapp.com",
            projectId: "sadaf245sz",
            storageBucket: "sadaf245sz.appspot.com",
            messagingSenderId: "1056584285437",
            appId: "1:1056584285437:web:7563870634685376c8c48a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.showMsg = (text) => {
            const toast = document.getElementById('custom-toast');
            toast.innerText = text; toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        };

        window.handleGoogleLogin = async () => {
            try {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                showMsg("স্বাগতম সিয়াম বস্!");
                setTimeout(() => { window.location.href = 'chat.html'; }, 1000);
            } catch (e) { showMsg("গুগল লগইন ব্যর্থ হয়েছে!"); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('lEmail').value.trim();
            const pass = document.getElementById('lPass').value;
            if(!email || !pass) return showMsg("সবগুলো ঘর পূরণ করুন!");
            try { await signInWithEmailAndPassword(auth, email, pass); window.location.href = 'chat.html'; }
            catch (e) { showMsg("ভুল ইমেইল বা পাসওয়ার্ড!"); }
        };

        window.handleSignup = async () => {
            const email = document.getElementById('sEmail').value;
            const pass = document.getElementById('sPass').value;
            if(pass !== document.getElementById('sConfirm').value) return showMsg("পাসওয়ার্ড ম্যাচ করেনি!");
            try { await createUserWithEmailAndPassword(auth, email, pass); showMsg("অ্যাকাউন্ট তৈরি সফল!"); toggleAuth(); }
            catch (e) { showMsg("ত্রুটি: " + e.message); }
        };

        window.togglePass = (id, el) => {
            const p = document.getElementById(id); p.type = p.type === 'password' ? 'text' : 'password';
            el.className = p.type === 'password' ? 'fa-solid fa-eye-slash eye-icon' : 'fa-solid fa-eye eye-icon';
        };
        window.toggleAuth = () => {
            const l = document.getElementById('loginForm'), s = document.getElementById('signupForm');
            l.style.display = l.style.display === 'none' ? 'flex' : 'none';
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        };
    </script>
</body>
</html>
