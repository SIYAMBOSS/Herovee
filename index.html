<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI System - Siyamboss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { background: #050505; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: white; margin: 0; overflow: hidden; }
        
        .herovee-title { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 5px; background: linear-gradient(90deg, #45f3ff, #ff3c7b, #45f3ff); background-size: 200% auto; -webkit-background-clip: text; color: transparent; animation: gradientShift 3s linear infinite; text-shadow: 0 0 15px rgba(69, 243, 255, 0.5); }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .orbit { position: absolute; width: 410px; height: 620px; background: linear-gradient(0deg, transparent, #45f3ff, #ff3c7b); border-radius: 50%; z-index: 1; animation: rotate 4s linear infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .auth-card { position: relative; width: 380px; min-height: 550px; background: #111; border-radius: 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 25px; border: 1px solid rgba(255,255,255,0.05); }

        .input-style { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 14px 20px; margin-bottom: 12px; color: white; outline: none; font-size: 14px; }
        .input-style:focus { border-color: #45f3ff; }

        .action-btn { width: 100%; padding: 15px; border-radius: 15px; background: linear-gradient(90deg, #45f3ff, #ff3c7b); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* Android Style Google ImageButton */
        #google_login_btn {
            width: 48px;
            height: 48px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #google_login_btn:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }

        /* Country List */
        .country-list { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; z-index: 50; max-height: 150px; overflow-y: auto; }
        .country-item { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #222; }
        .country-item:hover { background: #45f3ff22; color: #45f3ff; }

        /* Notification */
        #customAlert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 85%; background: #111; border-left: 5px solid #45f3ff; color: white; padding: 15px; border-radius: 10px; text-align: center; z-index: 9999; transition: 0.5s; font-size: 14px; }
        #customAlert.show { top: 20px; }
        #customAlert.error { border-left-color: #ff3c7b; }

        #signupFields { display: none; width: 100%; }
        #loginFields { width: 100%; }
    </style>
</head>
<body>

    <div id="customAlert">Notification</div>
    <div class="orbit"></div>
    
    <div class="auth-card shadow-2xl">
        <h2 class="herovee-title text-4xl mb-8">HEROVEE</h2>
        
        <div id="loginFields">
            <input type="email" id="loginEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="loginPass" placeholder="Password" class="input-style">
            <button onclick="handleLogin()" class="action-btn">SIGN IN</button>
            <p class="text-[12px] text-gray-500 mt-6 text-center">New here? <span onclick="toggleForm()" class="text-cyan-400 cursor-pointer font-bold underline">Create Account</span></p>
        </div>

        <div id="signupFields">
            <input type="text" id="signupName" placeholder="Full Name" class="input-style">
            
            <div class="relative w-full mb-3">
                <div onclick="toggleCountryList()" id="countryBox" class="input-style flex justify-between items-center cursor-pointer mb-0">
                    <span id="countryText">Select Country</span>
                    <span>▼</span>
                </div>
                <div id="countryList" class="country-list">
                    <div id="countryOptions"></div>
                </div>
            </div>

            <input type="email" id="signupEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="signupPass" placeholder="Password" class="input-style">
            <button onclick="handleSignup()" class="action-btn">CREATE ACCOUNT</button>
            <p class="text-[12px] text-gray-500 mt-4 text-center">Back to <span onclick="toggleForm()" class="text-cyan-400 cursor-pointer font-bold underline">Sign In</span></p>
        </div>

        <div id="google_login_btn" onclick="handleGoogleLogin()" aria-label="Google Login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="24" height="24" alt="Google Logo">
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2mVQ231K2kEqhxP01YJyiuZzsFK1RIcE",
            authDomain: "herovee-ai.firebaseapp.com",
            projectId: "herovee-ai",
            storageBucket: "herovee-ai.firebasestorage.app",
            messagingSenderId: "89517868095",
            appId: "1:89517868095:web:c0500e9a8dbb426cada48a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let selectedCountry = "";
        const countries = ["Bangladesh", "India", "USA", "UK", "Canada", "Australia", "UAE"];

        function showMessage(text, type = 'success') {
            const alertBox = document.getElementById('customAlert');
            alertBox.innerText = text;
            alertBox.className = type === 'error' ? 'show error' : 'show';
            setTimeout(() => alertBox.classList.remove('show'), 3500);
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await auth.signInWithPopup(provider);
                showMessage("Login Successful! Welcome " + result.user.displayName);
            } catch (err) { showMessage("Google Login Failed!", "error"); }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showMessage("Login Successful!");
            } catch (err) { showMessage("Invalid Credentials!", "error"); }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            if(!name || !selectedCountry) return showMessage("Please fill all details", "error");
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("users").doc(cred.user.uid).set({
                    fullName: name,
                    country: selectedCountry,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showMessage("Account Created!");
                toggleForm();
            } catch (err) { showMessage(err.message, "error"); }
        }

        function toggleForm() {
            const isL = document.getElementById('loginFields').style.display !== 'none';
            document.getElementById('loginFields').style.display = isL ? 'none' : 'block';
            document.getElementById('signupFields').style.display = isL ? 'block' : 'none';
        }

        function toggleCountryList() {
            const list = document.getElementById('countryList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }

        window.onload = () => {
            document.getElementById('countryOptions').innerHTML = countries.map(c => 
                `<div class="country-item" onclick="selectedCountry='${c}'; document.getElementById('countryText').innerText='${c}'; toggleCountryList();">${c}</div>`
            ).join('');
        };
    </script>
</body>
</html>
