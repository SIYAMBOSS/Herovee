<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            background: #050505; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            margin: 0; 
            overflow: hidden;
        }
        
        .herovee-title { 
            font-family: 'Orbitron', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            background: linear-gradient(90deg, #45f3ff, #ff3c7b, #45f3ff); 
            background-size: 200% auto; 
            -webkit-background-clip: text; 
            color: transparent; 
            animation: gradientShift 3s linear infinite; 
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.5); 
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        /* Mobile Only Card */
        .auth-card { 
            position: relative; 
            width: 90%; 
            max-width: 360px; 
            background: rgba(17, 17, 17, 0.9); 
            border-radius: 40px; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
        }

        .input-style { 
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            padding: 14px 20px; 
            margin-bottom: 15px; 
            color: white; 
            outline: none; 
            font-size: 15px; 
        }

        .action-btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 15px; 
            background: linear-gradient(90deg, #45f3ff, #ff3c7b); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(69, 243, 255, 0.2);
        }

        /* Google Logo Button */
        .google-icon-btn {
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
            background: white;
            padding: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .google-icon-btn:active { transform: scale(0.9); }

        /* Custom English Notification (Phone Top) */
        #customAlert { 
            position: fixed; 
            top: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85%; 
            background: rgba(17, 17, 17, 0.95); 
            border-left: 5px solid #45f3ff; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            z-index: 9999; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-size: 14px; 
        }
        #customAlert.show { top: 20px; }
        #customAlert.error { border-left-color: #ff3c7b; }

        #signupFields { display: none; width: 100%; }
        #loginFields { width: 100%; }
    </style>
</head>
<body>

    <div id="customAlert">Notification Message</div>
    
    <div class="auth-card shadow-2xl">
        <h2 class="herovee-title text-4xl mb-10">HEROVEE</h2>
        
        <div id="loginFields">
            <input type="email" id="loginEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="loginPass" placeholder="Password" class="input-style">
            <button onclick="handleLogin()" class="action-btn">SIGN IN</button>
            <p class="text-xs text-gray-500 mt-6 text-center">Don't have an account? <span onclick="toggleForm()" class="text-cyan-400 font-bold underline">Create Now</span></p>
        </div>

        <div id="signupFields">
            <input type="text" id="signupName" placeholder="Full Name" class="input-style">
            <input type="email" id="signupEmail" placeholder="Gmail Address" class="input-style">
            <input type="password" id="signupPass" placeholder="Password" class="input-style">
            <button onclick="handleSignup()" class="action-btn">CREATE ACCOUNT</button>
            <p class="text-xs text-gray-500 mt-6 text-center">Already have account? <span onclick="toggleForm()" class="text-cyan-400 font-bold underline">Login</span></p>
        </div>

        <div onclick="handleGoogleLogin()" class="google-icon-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="25" alt="Google">
        </div>
    </div>

    <script>
        // Firebase Configuration (Using your IDs)
        const firebaseConfig = {
            apiKey: "AIzaSyC2mVQ231K2kEqhxP01YJyiuZzsFK1RIcE",
            authDomain: "herovee-ai.firebaseapp.com",
            projectId: "herovee-ai",
            storageBucket: "herovee-ai.firebasestorage.app",
            messagingSenderId: "89517868095",
            appId: "1:89517868095:web:c0500e9a8dbb426cada48a"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function showMessage(text, type = 'success') {
            const alertBox = document.getElementById('customAlert');
            alertBox.innerText = text;
            alertBox.className = type === 'error' ? 'show error' : 'show';
            setTimeout(() => alertBox.classList.remove('show'), 3000);
        }

        // --- Google Login Fix ---
        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Force account selection (সব জিমেইল শো করানোর জন্য)
            provider.setCustomParameters({ prompt: 'select_account' });

            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                await db.collection("users").doc(user.uid).set({
                    fullName: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

                showMessage("Login Successful! Welcome " + user.displayName);
                // আপনার মেইন পেইজের লিঙ্ক এখানে দিতে পারেন
            } catch (err) {
                showMessage("Authentication Failed!", "error");
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if(!email || !pass) return showMessage("Please fill all fields", "error");
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showMessage("Login Successful!");
            } catch (err) { showMessage("Invalid Credentials!", "error"); }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            if(!name || !email || !pass) return showMessage("Fields cannot be empty", "error");
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("users").doc(cred.user.uid).set({
                    fullName: name,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showMessage("Account Created Successfully!");
                toggleForm();
            } catch (err) { showMessage(err.message, "error"); }
        }

        function toggleForm() {
            const isL = document.getElementById('loginFields').style.display !== 'none';
            document.getElementById('loginFields').style.display = isL ? 'none' : 'block';
            document.getElementById('signupFields').style.display = isL ? 'block' : 'none';
        }
    </script>
</body>
</html>
