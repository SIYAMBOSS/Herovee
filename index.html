<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herovee AI - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orbit"></div>
    <div class="auth-card">
        <h2 class="herovee-title">HEROVEE</h2>
        
        <div id="loginForm" style="width:100%; display: flex; flex-direction: column;">
            <div class="input-group">
                <input type="email" id="lEmail" placeholder="Gmail Address" class="input-style">
            </div>
            <div class="input-group">
                <input type="password" id="lPass" placeholder="Password" class="input-style">
                <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePass('lPass', this)"></i>
            </div>
            <button onclick="handleLogin()" class="action-btn">SIGN IN</button>
            <p style="text-align:center; margin-top:22px; font-size:12px; color: #888;">
                New? <span onclick="toggleAuth()" style="color:#45f3ff; cursor:pointer; font-weight:bold;">Create Account</span>
            </p>
        </div>

        <div id="signupForm" style="display:none; width:100%;">
            <div class="input-group">
                <input type="text" id="countryInp" placeholder="Select Country" class="input-style" readonly onclick="toggleList()">
                <div id="countryList" class="country-list">
                    <div class="search-box"><input type="text" id="countrySearch" placeholder="Search country..." onkeyup="filterCountries()"></div>
                    <div id="countriesWrapper"></div>
                </div>
            </div>
            <input type="email" id="sEmail" placeholder="Gmail Address" class="input-style" style="margin-bottom:14px;">
            <div class="input-group">
                <input type="password" id="sPass" placeholder="Create Password" class="input-style">
                <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePass('sPass', this)"></i>
            </div>
            <div class="input-group">
                <input type="password" id="sConfirm" placeholder="Confirm Password" class="input-style">
                <i class="fa-solid fa-eye-slash eye-icon" onclick="togglePass('sConfirm', this)"></i>
            </div>
            <button onclick="handleSignup()" class="action-btn">CREATE ACCOUNT</button>
            <p style="text-align:center; margin-top:22px; font-size:12px; color: #888;">
                Back to <span onclick="toggleAuth()" style="color:#45f3ff; cursor:pointer; font-weight:bold;">Sign In</span>
            </p>
        </div>

        <div id="google_login_btn" onclick="alert('Please use standard login for now.')">
            <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="30">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার দেওয়া কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyDjN0RJ-iR0NSbVe_jizvGt_UBO4C8XOBU", 
            authDomain: "sadaf245sz.firebaseapp.com",
            projectId: "sadaf245sz",
            storageBucket: "sadaf245sz.appspot.com",
            messagingSenderId: "1056584285437",
            appId: "1:1056584285437:web:7563870634685376c8c48a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const allCountries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Brazil","Brunei","Bulgaria","Cambodia","Cameroon","Canada","Chile","China","Colombia","Denmark","Egypt","Finland","France","Germany","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Japan","Malaysia","Maldives","Mexico","Nepal","Netherlands","New Zealand","Norway","Pakistan","Philippines","Qatar","Russia","Saudi Arabia","Singapore","South Africa","South Korea","Spain","Sri Lanka","Sweden","Switzerland","Thailand","Turkey","UAE","United Kingdom","United States","Vietnam"];

        window.handleLogin = async () => {
            const email = document.getElementById('lEmail').value;
            const pass = document.getElementById('lPass').value;
            if(!email || !pass) return alert("Email and Password required!");
            try { await signInWithEmailAndPassword(auth, email, pass); window.location.href = 'chat.html'; }
            catch (e) { alert("Login failed! Check credentials."); }
        };

        window.handleSignup = async () => {
            const email = document.getElementById('sEmail').value;
            const pass = document.getElementById('sPass').value;
            const confirm = document.getElementById('sConfirm').value;
            const country = document.getElementById('countryInp').value;
            if(!email || !country) return alert("All fields are required!");
            if(pass !== confirm) return alert("Passwords do not match!");
            try { await createUserWithEmailAndPassword(auth, email, pass); alert("Account Created!"); toggleAuth(); }
            catch (e) { alert(e.message); }
        };

        // UI Logic
        window.togglePass = (id, el) => {
            const p = document.getElementById(id);
            p.type = p.type === 'password' ? 'text' : 'password';
            el.className = p.type === 'password' ? 'fa-solid fa-eye-slash eye-icon' : 'fa-solid fa-eye eye-icon';
        };
        window.toggleAuth = () => {
            document.getElementById('loginForm').style.display = document.getElementById('loginForm').style.display === 'none' ? 'flex' : 'none';
            document.getElementById('signupForm').style.display = document.getElementById('signupForm').style.display === 'none' ? 'block' : 'none';
        };
        window.toggleList = () => {
            const list = document.getElementById('countryList');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
            if(list.style.display === 'block') renderCountries(allCountries);
        };
        window.renderCountries = (list) => {
            const wrapper = document.getElementById('countriesWrapper');
            wrapper.innerHTML = "";
            list.forEach(c => {
                let d = document.createElement('div'); d.className='country-item'; d.innerText=c;
                d.onclick = () => { document.getElementById('countryInp').value=c; document.getElementById('countryList').style.display='none'; };
                wrapper.appendChild(d);
            });
        };
        window.filterCountries = () => {
            const term = document.getElementById('countrySearch').value.toLowerCase();
            renderCountries(allCountries.filter(c => c.toLowerCase().includes(term)));
        };
    </script>
</body>
</html>
