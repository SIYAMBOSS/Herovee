<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Herovee - Access</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="glow-bg"></div>

    <div class="card">
        <h1 class="logo">HEROVEE</h1>
        <div class="input-group">
            <input type="email" id="email" class="input-style" placeholder="Gmail Address">
            <input type="password" id="passKey" class="input-style" placeholder="Password">
        </div>
        <button class="btn-primary" id="loginBtn">SIGN IN</button>
        <p class="footer-text">Don't have an account? <span class="link">Create Account</span></p>
    </div>

    <div id="toast">Invalid Access!</div>

    <script type="module" src="login.js"></script>
</body>
</html>
